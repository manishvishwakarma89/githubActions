# Name of workflow
name: CICD

# Trigger manually
on:
  workflow_dispatch:
    # inputs the env dev,staging,production
    inputs:
      environment:
        description: This is the environment where this workflows runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
          
jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "Code clone from GitHub"

  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build Docker container
        run: echo "Docker container build"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test the container
        run: echo "Test the container"

  deploy:
    if: inputs.environment == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy the container
        run: echo "Deploy docker compose the app"
