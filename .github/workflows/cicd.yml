name: CICD

on:
    #This means the pipeline runs manually from GitHub UI.
  workflow_dispatch:
    inputs:
      environment:
        description: This is environment where this workflows runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:

    code:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            run: echo "Code clone from GitHub"
            
    build:
        runs-on: ubuntu-latest
        needs: code
        steps:
          - name: Build the Docker container
            run: echo "Docker build container"
    
    test: 
        runs-on: ubuntu-latest 
        needs: build 
        steps:
            - name: Test the container
              run: echo "Docker run/exec container"
    
    deploy:
          if: inputs.environment == 'dev'
          needs: [build,test]
          runs-on: ubuntu-latest
          steps:
          - name: Deploy the container
            run: echo "Deploy the container using docker compose up -d"
        
